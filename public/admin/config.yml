backend:
  name: github
  repo: GDK-13/shaggy-solstice
  branch: master

media_folder: "public/media"
public_folder: "media"


collections:
  - name: "projetos"
    label: "Ações e Projetos"
    folder: "src/content/projetos"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descrição", name: "description", widget: "text"}
      - {label: "Imagem", name: "image", widget: "image", required: false}